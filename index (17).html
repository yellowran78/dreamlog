// ── Google Sheets 헬퍼 ────────────────────────
async function gsGet(a){
  if(!SCRIPT_URL)return{ok:false};
  try{const r=await fetch(`${SCRIPT_URL}?action=${a}`);return r.json();}
  catch(e){return{ok:false};}
}
async function gsPost(b){
  if(!SCRIPT_URL)return{ok:false};
  try{
    const r=await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(b),
      redirect:"follow"
    });
    const text=await r.text();
    try{return JSON.parse(text);}catch(e){return{ok:true};}
  }catch(e){return{ok:false};}
}

// ── 파일 파싱 ─────────────────────────────────
async function parseFileWithPhone(file){
  const ext=file.name.split(".").pop().toLowerCase();
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onerror=()=>reject(new Error("읽기 실패"));
    r.onload=e=>{
      try{
        let rows=[];
        if(["xlsx","xls","ods"].includes(ext)){
          const wb=XLSX.read(e.target.result,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        } else {
          const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
          const sep=lines[0]?.includes("\t")?"\t":",";
          rows=lines.map(l=>l.split(sep).map(c=>c.replace(/"/g,"").trim()));
        }
        if(!rows||rows.length<2){resolve(null);return;}
        const h=rows[0].map(x=>String(x??"").trim());
        const hkIdx=h.findIndex(v=>v.includes("학번")||v.toLowerCase()==="id");
        const nmIdx=h.findIndex(v=>["이름","성명","name"].some(a=>v.toLowerCase().includes(a)));
        const gnIdx=h.findIndex(v=>["성별","gender"].some(a=>v.toLowerCase().includes(a)));
        const phIdx=h.findIndex(v=>["휴대폰","전화","phone","연락"].some(a=>v.toLowerCase().includes(a)));
        if(hkIdx>=0&&nmIdx>=0){
          const students={1:[],2:[],3:[]};
          for(let i=1;i<rows.length;i++){
            const c=rows[i].map(x=>String(x??"").trim());
            const hk=c[hkIdx].replace(/\s/g,"");
            if(!/^\d{5}$/.test(hk))continue;
            const g=+hk[0],cls=+hk.slice(1,3),num=+hk.slice(3,5);
            if(![1,2,3].includes(g))continue;
            students[g].push({id:`${g}-${cls}-${pad(num)}`,grade:g,cls,num,name:c[nmIdx],gender:gnIdx>=0?c[gnIdx]:"",phone:phIdx>=0?c[phIdx]:""});
          }
          const total=Object.values(students).flat().length;
          resolve(total>0?students:null);
        } else { resolve(null); }
      }catch(err){reject(err);}
    };
    if(["xlsx","xls","ods"].includes(ext))r.readAsArrayBuffer(file);
    else r.readAsText(file,"utf-8");
  });
}

// ── 차트 ──────────────────────────────────────
function LineChart({data,max,w=228,h=68}){
  if(!data||data.length<2)return null;
  const pts=data.map((v,i)=>[8+(i/(data.length-1))*(w-16),h-8-((v/(max||1))*(h-16))]);
  const path=pts.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const area=path+` L${pts[pts.length-1][0].toFixed(1)},${h-8} L${pts[0][0].toFixed(1)},${h-8} Z`;
  const lp=pts[pts.length-1];
  return(<svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.mint} stopOpacity=".2"/><stop offset="100%" stopColor={C.mint} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#lg)"/><path d={path} fill="none" stroke={C.mint} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    <circle cx={lp[0]} cy={lp[1]} r="4" fill={C.mint} stroke="#fff" strokeWidth="2"/>
  </svg>);
}
function Donut({slices,sz=76}){
  let cum=0;const tot=slices.reduce((s,x)=>s+x.v,0)||1;
  const cx=sz/2,cy=sz/2,r=sz/2-7,ir=sz/2-18;
  return(<svg width={sz} height={sz}>{slices.map(s=>{
    const fr=s.v/tot;const a1=cum*2*Math.PI-Math.PI/2,a2=(cum+fr)*2*Math.PI-Math.PI/2;cum+=fr;
    if(fr===0)return null;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a1),yi1=cy+ir*Math.sin(a1),xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2);
    return <path key={s.label} d={`M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${fr>.5?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi2.toFixed(2)},${yi2.toFixed(2)} A${ir},${ir} 0 ${fr>.5?1:0},0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z`} fill={s.color}/>;
  })}</svg>);
}

// 학생 검색 + 상담/예약 모달
// ══════════════════════════════════════════════
// 상담 시간대 정의
const TIME_SLOTS = [
  {label:"일과 전",  ts:"08:00", te:"08:50"},
  {label:"점심시간", ts:"12:30", te:"13:00"},
  {label:"7교시",    ts:"16:00", te:"16:50"},
  {label:"직접 입력",ts:"",      te:""},
];

// ══════════════════════════════════════════════
// 학생 찾기 모달
// ══════════════════════════════════════════════
function SearchModal({allStu, defaultDate, onCounsel, onReserve, onClose}){
  const today = new Date();
  const [q,      setQ    ] = useState("");
  const [selStu, setSelStu] = useState(null);
  const [mode,   setMode  ] = useState("reserve"); // "reserve" | "counsel"
  const [date,   setDate  ] = useState(defaultDate || dkey(today.getFullYear(),today.getMonth(),today.getDate()));
  const [type,   setType  ] = useState("진로 고민");
  const [slot,   setSlot  ] = useState(0); // TIME_SLOTS index
  const [ts,     setTs    ] = useState("08:00");
  const [te,     setTe    ] = useState("08:50");
  const [note,   setNote  ] = useState("");

  const results = useMemo(()=>{
    if(q.trim().length<1) return [];
    const kw = q.trim();
    return allStu.filter(s=>
      s.name.includes(kw) ||
      hakbun(s).includes(kw) ||
      s.phone?.includes(kw)
    ).slice(0, 15);
  }, [q, allStu]);

  function pickStu(s){
    setSelStu(s);
    setQ("");
  }

  function pickSlot(i){
    setSlot(i);
    if(i < 3){
      setTs(TIME_SLOTS[i].ts);
      setTe(TIME_SLOTS[i].te);
    }
  }

  function submit(){
    if(!selStu) return;
    const form = {
      type,
      timeStart: slot===3 ? ts : TIME_SLOTS[slot].ts,
      timeEnd:   slot===3 ? te : TIME_SLOTS[slot].te,
      timeLabel: slot===3 ? `${ts}~${te}` : TIME_SLOTS[slot].label,
      note,
      id: Math.random().toString(36).slice(2)
    };
    if(mode==="counsel") onCounsel(selStu, date, form);
    else                  onReserve(selStu, date, form);
    onClose();
  }

  const inp = {width:"100%",padding:"9px 11px",border:`1.5px solid ${C.bdr}`,borderRadius:8,fontSize:13,fontFamily:"inherit",background:C.white,color:C.txt,outline:"none",boxSizing:"border-box"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(27,58,92,.3)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.white,borderRadius:18,width:480,maxHeight:"92vh",overflow:"auto",border:`1px solid ${C.bdr}`,boxShadow:"0 24px 64px rgba(27,58,92,.22)"}}>

        {/* 헤더 */}
        <div style={{padding:"20px 22px 16px",borderBottom:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:`linear-gradient(135deg,${C.navyPal},${C.mintPal})`,borderRadius:"18px 18px 0 0"}}>
          <div>
            <div style={{fontSize:17,fontWeight:800,color:C.txt,display:"flex",alignItems:"center",gap:8}}>
              <i className="ti ti-search" style={{fontSize:16,color:C.mint}}/> 학생 찾기
            </div>
            <div style={{fontSize:11,color:C.txtHint,marginTop:3}}>이름·학번·전화번호로 검색 → 선택 → 예약 또는 기록</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:24,color:C.txtHint,lineHeight:1}}>×</button>
        </div>

        <div style={{padding:"20px 22px"}}>

          {/* ── 검색창 ── */}
          <div style={{marginBottom:16}}>
            <div style={{position:"relative"}}>
              <i className="ti ti-search" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.mint}}/>
              <input
                value={q}
                onChange={e=>{setQ(e.target.value); if(selStu)setSelStu(null);}}
                placeholder="이름, 학번(예: 10101), 전화번호..."
                autoFocus
                style={{...inp, paddingLeft:38, fontSize:14, borderColor:C.mint, borderWidth:"1.5px"}}
              />
              {q&&<button onClick={()=>{setQ("");setSelStu(null);}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.txtHint,fontSize:16}}>×</button>}
            </div>

            {/* 검색 결과 */}
            {q.trim() && results.length>0 && !selStu && (

                {results.map((s,i)=>(
                  <div key={s.id} onClick={()=>pickStu(s)} style={{
                    display:"flex",alignItems:"center",gap:12,padding:"11px 14px",

                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,color:C.white,fontSize:16}}>{selStu.name}</div>
                  <div style={{fontSize:12,color:C.mintMid,marginTop:3}}>

                {slot===3&&(

                  rows={3} style={{...inp,resize:"vertical"}}/>
              </div>

              <button onClick={submit} style={{

                border:"none",borderRadius:12,color:C.white,letterSpacing:"-0.3px",

                  :`linear-gradient(135deg,${C.mint},${C.mintDk})`,

            </>
          )}
        </div>
      </div>
    </div>
  );
}

// 메인 앱

function App(){
  const today = new Date();
  const [stu,      setStu     ] = useState(DEF_STU);
  const [rec,      setRec     ] = useState({});
  const [resv,     setResv    ] = useState({});
  const [yr,       setYr      ] = useState(today.getFullYear());
  const [mo,       setMo      ] = useState(today.getMonth());
  const [sel,      setSel     ] = useState(dkey(today.getFullYear(),today.getMonth(),today.getDate()));
  const [view,     setView    ] = useState("calendar");
  const [grade,    setGrade   ] = useState(0);
  const [showSearch,setShowSearch]=useState(false);
  const [dStu,     setDStu    ] = useState(null);
  const [upMod,    setUpMod   ] = useState(false);
  const [compMod,  setCompMod ] = useState(null); // {resv, date}
  const [sync,     setSync    ] = useState("idle");
  const [sMsg,     setSMsg    ] = useState("");
  const tmr  = useRef(null);
  const first= useRef(true);

  const allStu = useMemo(()=>[...stu[1],...stu[2],...stu[3]],[stu]);

  const moRec = useMemo(()=>{
    const pfx=`${yr}-${pad(mo+1)}`;
    return Object.fromEntries(Object.entries(rec).filter(([k])=>k.startsWith(pfx)));
  },[rec,yr,mo]);

  const stats = useMemo(()=>{
    let total=0; const ss=new Set(),ds=new Set(),tm={};
    TYPES.forEach(t=>tm[t]=0);
    Object.entries(moRec).forEach(([d,v])=>{
      ds.add(d);
      Object.entries(v).forEach(([sid,logs])=>{ss.add(sid);logs.forEach(l=>{total++;tm[l.type]=(tm[l.type]||0)+1;});});
    });
    const dim=new Date(yr,mo+1,0).getDate(); let cum=0;
    const daily=Array.from({length:dim},(_,i)=>{
      const k=dkey(yr,mo,i+1);
      if(moRec[k])Object.values(moRec[k]).forEach(ls=>cum+=ls.length);
      return cum;
    });
    return{total,students:ss.size,days:ds.size,tm,daily,dim};
  },[moRec,yr,mo]);

  const selRec  = useMemo(()=>rec[sel]||{},[rec,sel]);
  const selResv = useMemo(()=>resv[sel]||[],[resv,sel]);
  const selC    = useMemo(()=>
    Object.entries(selRec).flatMap(([sid,logs])=>{
      const s=allStu.find(x=>x.id===sid);
      return logs.map(l=>({...l,sid,stu:s}));
    }).sort((a,b)=>a.timeStart.localeCompare(b.timeStart))
  ,[selRec,allStu]);

  const recent = useMemo(()=>
    Object.entries(rec).flatMap(([d,v])=>Object.entries(v).flatMap(([sid,logs])=>logs.map(l=>({...l,date:d,sid}))))
    .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5)
  ,[rec]);

  const calDays = useMemo(()=>{
    const f=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),pd=new Date(yr,mo,0).getDate();
    const c=[];
    for(let i=0;i<f;i++)c.push({day:pd-f+1+i,cur:false});
    for(let d=1;d<=dim;d++)c.push({day:d,cur:true});
    const rem=(7-((f+dim)%7))%7;
    for(let i=1;i<=rem;i++)c.push({day:i,cur:false});
    return c;
  },[yr,mo]);

  const todayKey = dkey(today.getFullYear(),today.getMonth(),today.getDate());

  // 구글 시트 불러오기
  useEffect(()=>{
    if(!SCRIPT_URL)return;
    setSync("loading");setSMsg("불러오는 중...");
    gsGet("getAll").then(r=>{
      if(r.ok){
        // 날짜 키 정규화 함수 (구글 시트에서 Date 객체로 올 수 있음)
        function fixDateKey(key){
          if(!key) return key;
          const s = String(key);
          // 이미 YYYY-MM-DD 형식이면 그대로
          if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
          // Date 문자열이면 파싱
          try{
            const d = new Date(s);
            if(!isNaN(d.getTime())){
              const y = d.getFullYear();
              const m = String(d.getMonth()+1).padStart(2,'0');
              const dd = String(d.getDate()).padStart(2,'0');
              return `${y}-${m}-${dd}`;
            }
          }catch(e){}
          return s;
        }
        if(r.records&&Object.keys(r.records).length>0){
          // 날짜 키 정규화
          const fixedRec={};
          Object.entries(r.records).forEach(([k,v])=>{
            const fk=fixDateKey(k);
            if(fk) fixedRec[fk]=v;
          });
          setRec(fixedRec);
        }
        if(r.students&&r.students[1]?.length>0) setStu(r.students);
        if(r.resv&&Object.keys(r.resv).length>0){
          const fixedResv={};
          Object.entries(r.resv).forEach(([k,v])=>{
            const fk=fixDateKey(k);
            if(fk) fixedResv[fk]=v;
          });
          setResv(fixedResv);
        }
        setSync("saved");setSMsg("불러오기 완료 ✓");setTimeout(()=>setSMsg(""),3000);
      } else {setSync("error");setSMsg("오류");}
    }).catch(()=>{setSync("error");setSMsg("연결 오류");});
  },[]);

  // 자동 저장 — 상담기록 변경 시
  useEffect(()=>{
    if(first.current){first.current=false;return;}
    if(!SCRIPT_URL)return;
    clearTimeout(tmr.current);setSync("saving");setSMsg("저장 중...");
    tmr.current=setTimeout(()=>{
      // 상담기록 + 예약 함께 저장
      gsPost({action:"saveAll", records:rec, resv}).then(r=>{
        if(r.ok){setSync("saved");setSMsg("저장 완료 ✓");setTimeout(()=>setSMsg(""),3000);}
        else{setSync("error");setSMsg("저장 실패");}
      });
    },1500);
  },[rec]);

  // 자동 저장 — 예약 변경 시
  const firstResv = useRef(true);
  useEffect(()=>{
    if(firstResv.current){firstResv.current=false;return;}
    if(!SCRIPT_URL)return;
    clearTimeout(tmr.current);setSync("saving");setSMsg("저장 중...");
    tmr.current=setTimeout(()=>{
      gsPost({action:"saveAll", records:rec, resv}).then(r=>{
        if(r.ok){setSync("saved");setSMsg("저장 완료 ✓");setTimeout(()=>setSMsg(""),3000);}
        else{setSync("error");setSMsg("저장 실패");}
      });
    },1500);
  },[resv]);

  function addCounsel(stuObj, dateStr, formData){
    setRec(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(!n[dateStr])n[dateStr]={};
      if(!n[dateStr][stuObj.id])n[dateStr][stuObj.id]=[];
      n[dateStr][stuObj.id].push(formData);
      return n;
    });
  }

  function addReserve(stuObj, dateStr, formData){
    setResv(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(!n[dateStr])n[dateStr]=[];
      n[dateStr].push({...formData, sid:stuObj.id});
      return n;
    });
  }

  function completeResv(dateStr, resvId, note){
    const r=resv[dateStr]?.find(x=>x.id===resvId);
    if(!r)return;
    const stuObj=allStu.find(s=>s.id===r.sid);
    if(!stuObj)return;

    // 상담기록과 예약을 동시에 업데이트
    const newLog = {type:r.type, timeStart:r.timeStart, timeEnd:r.timeEnd, timeLabel:r.timeLabel||"", note, id:Math.random().toString(36).slice(2)};

    setRec(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(!n[dateStr])n[dateStr]={};
      if(!n[dateStr][stuObj.id])n[dateStr][stuObj.id]=[];
      n[dateStr][stuObj.id].push(newLog);
      return n;
    });

    setResv(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(n[dateStr]){
        n[dateStr]=n[dateStr].filter(x=>x.id!==resvId);
        if(!n[dateStr].length)delete n[dateStr];
      }
      return n;
    });

    setCompMod(null);
  }

  function delCounsel(date,sid,cid){
    setRec(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(n[date]&&n[date][sid]){
        n[date][sid]=n[date][sid].filter(c=>c.id!==cid);
        if(!n[date][sid].length)delete n[date][sid];
        if(!Object.keys(n[date]).length)delete n[date];
      }
      return n;
    });
  }

  function delResv(dateStr, resvId){
    setResv(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(n[dateStr]){n[dateStr]=n[dateStr].filter(x=>x.id!==resvId);if(!n[dateStr].length)delete n[dateStr];}
      return n;
    });
  }

  function allForStu(sid){
    return Object.entries(rec).filter(([,v])=>v[sid])
      .flatMap(([d,v])=>v[sid].map(c=>({...c,date:d})))
      .sort((a,b)=>a.date.localeCompare(b.date));
  }

  function prevMo(){if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}
  function nextMo(){if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}

  const navItems=[
    {id:"calendar",icon:"ti-calendar",label:"상담 달력"},
    {id:"records", icon:"ti-clipboard-text",label:"상담 기록"},
    {id:"students",icon:"ti-users",label:"학생 관리"},
    {id:"stats",   icon:"ti-chart-line",label:"통계"},
    {id:"report",  icon:"ti-file-spreadsheet",label:"총괄표"},
  ];
  const navS=(a)=>({display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,cursor:"pointer",marginBottom:2,background:a?C.mintLt:"transparent",color:a?C.mintDk:C.txtSub,fontSize:13,fontWeight:a?600:400,borderLeft:`3px solid ${a?C.mint:"transparent"}`});
  const card={background:C.white,borderRadius:12,border:`1px solid ${C.bdr}`,padding:"18px 20px",marginBottom:16,boxShadow:"0 1px 8px rgba(27,58,92,.05)"};

  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Noto Sans KR',sans-serif",background:C.bg,overflow:"hidden"}}>

      {/* 사이드바 */}
      <div style={{width:210,background:C.white,borderRight:`1px solid ${C.bdr}`,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"18px 16px 14px",borderBottom:`1px solid ${C.bdr}`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,${C.mint},${C.mintDk})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <i className="ti ti-school" style={{color:C.white,fontSize:18}}/>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:C.txt}}>드림로그</div>
            <div style={{fontSize:10,color:C.txtHint}}>진로상담 관리</div>
          </div>
        </div>

        {/* 상담 기록 빠른 버튼 */}
        <div style={{padding:"10px 10px 0"}}>
          <button onClick={()=>setShowSearch(true)} style={{
            width:"100%",padding:"10px 0",borderRadius:9,fontSize:13,fontWeight:700,
            cursor:"pointer",fontFamily:"inherit",border:"none",
            background:`linear-gradient(135deg,${C.mint},${C.mintDk})`,
            color:C.white,boxShadow:`0 3px 10px ${C.mint}44`,
            display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginBottom:8,
          }}>
            <i className="ti ti-search" style={{fontSize:15}}/> 학생 찾기
          </button>

          <div style={{fontSize:10,fontWeight:700,color:C.txtHint,letterSpacing:"0.08em",padding:"4px 12px",textTransform:"uppercase"}}>메뉴</div>
          {navItems.map(it=><div key={it.id} style={navS(view===it.id)} onClick={()=>setView(it.id)}><i className={`ti ${it.icon}`} style={{fontSize:15}}/><span>{it.label}</span></div>)}

          <div style={{margin:"8px 4px",height:1,background:C.bdr}}/>
          <div style={{fontSize:10,fontWeight:700,color:C.txtHint,letterSpacing:"0.08em",padding:"0 12px 4px",textTransform:"uppercase"}}>관리</div>
          <div style={navS(false)} onClick={()=>setUpMod(true)}><i className="ti ti-table-import" style={{fontSize:15}}/><span>명렬표 관리</span></div>
          <div style={navS(false)}><i className="ti ti-settings" style={{fontSize:15}}/><span>설정</span></div>
        </div>

        <div style={{flex:1}}/>
        <div style={{padding:"12px 16px",borderTop:`1px solid ${C.bdr}`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:`linear-gradient(135deg,${C.mint},${C.navy})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:C.white,flexShrink:0}}>아</div>
            <div><div style={{fontSize:12,fontWeight:600,color:C.txt}}>아름다움이란 선생님</div><div style={{fontSize:10,color:C.txtHint}}>진로상담 교사</div></div>
          </div>
        </div>
      </div>

      {/* 메인 */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* 탑바 */}
        <div style={{background:C.white,borderBottom:`1px solid ${C.bdr}`,padding:"0 20px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16,fontWeight:700,color:C.txt}}>
              {view==="calendar"?"상담 달력":view==="records"?"상담 기록":view==="students"?"학생 관리":view==="report"?"총괄표":"통계"}
            </span>
            <span style={{background:C.navyPal,color:C.navyMid,borderRadius:6,padding:"2px 9px",fontSize:11,border:`1px solid ${C.navyLt}`}}>
              {yr}.{pad(mo+1)}.01~{pad(mo+1)}.{new Date(yr,mo+1,0).getDate()}
            </span>
            {sync==="saving"&&<span style={{background:C.mintPal,color:C.mintDk,borderRadius:6,padding:"2px 8px",fontSize:11}}><i className="ti ti-cloud-upload" style={{fontSize:10,marginRight:3}}/>{sMsg}</span>}
            {sync==="saved"&&sMsg&&<span style={{background:C.mintLt,color:C.mintDk,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}}><i className="ti ti-cloud-check" style={{fontSize:10,marginRight:3}}/>{sMsg}</span>}
            {sync==="error"&&<span style={{background:C.redLt,color:C.red,borderRadius:6,padding:"2px 8px",fontSize:11}}>동기화 오류</span>}
          </div>
          <button onClick={()=>setShowSearch(true)} style={{
            background:`linear-gradient(135deg,${C.mint},${C.mintDk})`,color:C.white,border:"none",
            borderRadius:9,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
            display:"flex",alignItems:"center",gap:5,boxShadow:`0 3px 10px ${C.mint}44`,
          }}><i className="ti ti-search" style={{fontSize:13}}/> 학생 찾기</button>
        </div>

        {/* 콘텐츠 */}
        <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 285px",overflow:"hidden"}}>
          <div style={{overflow:"auto",padding:"18px 0 18px 18px"}}>
            {view==="calendar"&&<CalView yr={yr} mo={mo} calDays={calDays} sel={sel} setSel={setSel} todayKey={todayKey} moRec={moRec} allStu={allStu} grade={grade} setGrade={setGrade} selC={selC} selResv={selResv} resv={resv} delCounsel={delCounsel} delResv={delResv} setDStu={setDStu} prevMo={prevMo} nextMo={nextMo} today={today} setYr={setYr} setMo={setMo} card={card} setCompMod={setCompMod} setShowSearch={setShowSearch}/>}
            {view==="records"&&<RecView rec={rec} allStu={allStu} delCounsel={delCounsel} setDStu={setDStu} card={card}/>}
            {view==="students"&&<StuView stu={stu} allStu={allStu} allForStu={allForStu} setDStu={setDStu} setUpMod={setUpMod} card={card}/>}
            {view==="stats"&&<StatView rec={rec} yr={yr} mo={mo} card={card}/>}
            {view==="report"&&<ReportView rec={rec} allStu={allStu} card={card}/>}
          </div>

          {/* 우측 패널 */}
          <RightPanel stats={stats} recent={recent} allStu={allStu} yr={yr} mo={mo} setView={setView} setDStu={setDStu}/>
        </div>
      </div>

      {/* 모달들 */}
      {showSearch&&<SearchModal allStu={allStu} defaultDate={sel} onCounsel={addCounsel} onReserve={addReserve} onClose={()=>setShowSearch(false)}/>}
      {compMod&&<CompleteModal resv={compMod.resv} date={compMod.date} allStu={allStu} onComplete={(note)=>completeResv(compMod.date,compMod.resv.id,note)} onClose={()=>setCompMod(null)}/>}
      {dStu&&<StuDet stu={dStu} rec={rec} allForStu={allForStu} onClose={()=>setDStu(null)} delCounsel={delCounsel}/>}
      {upMod&&<UpMod stu={stu} setStu={setStu} onClose={()=>setUpMod(false)}/>}
    </div>
  );
}

// ── 우측 패널 ─────────────────────────────────
function RightPanel({stats,recent,allStu,yr,mo,setView,setDStu}){
  return(
    <div style={{background:C.white,borderLeft:`1px solid ${C.bdr}`,padding:"18px 14px",overflowY:"auto",display:"flex",flexDirection:"column",gap:18}}>
      <div>
        <div style={{fontSize:11,fontWeight:700,color:C.txtHint,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>이달의 상담 현황</div>
        {[
          {label:"상담 건수",value:`${stats.total}건`,sub:`일평균 ${(stats.total/new Date(yr,mo+1,0).getDate()).toFixed(1)}건`,icon:"ti-message-circle-2",g:[C.mint,C.mintDk]},
          {label:"상담 학생 수",value:`${stats.students}명`,icon:"ti-user-check",g:[C.navy,C.navyMid]},
          {label:"상담 일수",value:`${stats.days}일`,icon:"ti-calendar-check",g:["#7B5CF0","#5340B5"]},
        ].map(s=>(
          <div key={s.label} style={{background:C.bg,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",border:`1px solid ${C.bdr}`}}>
            <div><div style={{fontSize:11,color:C.txtHint,marginBottom:4}}>{s.label}</div><div style={{fontSize:21,fontWeight:700,color:C.txt}}>{s.value}</div>{s.sub&&<div style={{fontSize:10,color:C.txtHint,marginTop:2}}>{s.sub}</div>}</div>
            <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${s.g[0]},${s.g[1]})`,display:"flex",alignItems:"center",justifyContent:"center"}}><i className={`ti ${s.icon}`} style={{fontSize:16,color:C.white}}/></div>
          </div>
        ))}
      </div>
      <div>
        <div style={{fontSize:11,fontWeight:700,color:C.txtHint,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>일자별 누적</div>
        <div style={{background:C.bg,borderRadius:10,padding:"10px",border:`1px solid ${C.bdr}`}}>
          <LineChart data={stats.daily} max={Math.max(...stats.daily,1)}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.txtHint,marginTop:4}}><span>1일</span><span>10일</span><span>20일</span><span>{stats.dim}일</span></div>
        </div>
      </div>
      <div>
        <div style={{fontSize:11,fontWeight:700,color:C.txtHint,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>상담 구분</div>
        <div style={{background:C.bg,borderRadius:10,padding:"12px",display:"flex",gap:10,alignItems:"center",border:`1px solid ${C.bdr}`}}>
          <Donut sz={72} slices={TYPES.map((t,i)=>({label:t,v:stats.tm[t]||0,color:[C.mint,C.navy,C.purple,"#B0C4C0"][i]}))}/>
          <div style={{flex:1}}>{TYPES.map((t,i)=>{const v=stats.tm[t]||0,pct=stats.total>0?Math.round(v/stats.total*100):0;return(<div key={t} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,fontSize:11}}><div style={{width:6,height:6,borderRadius:"50%",background:[C.mint,C.navy,C.purple,"#B0C4C0"][i],flexShrink:0}}/><span style={{flex:1,color:C.txtSub}}>{t}</span><span style={{fontWeight:600,color:C.txt}}>{v}건</span><span style={{color:C.txtHint,fontSize:10}}>({pct}%)</span></div>);})} </div>
        </div>
      </div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:C.txtHint,letterSpacing:"0.08em",textTransform:"uppercase"}}>최근 기록</div>
          <span style={{fontSize:11,color:C.mint,cursor:"pointer"}} onClick={()=>setView("records")}>더보기 ›</span>
        </div>
        {recent.length===0&&<div style={{fontSize:12,color:C.txtHint,textAlign:"center",padding:"16px 0"}}>아직 상담 기록이 없습니다</div>}
        {recent.map((r,i)=>{const s=allStu.find(x=>x.id===r.sid);const tc=TC[r.type]||TC["기타"];return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.bdr}`}}>
          <div style={{width:30,height:30,borderRadius:7,background:`linear-gradient(135deg,${C.mintLt},${C.mint}30)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.mintDk,flexShrink:0,cursor:"pointer"}} onClick={()=>setDStu(s)}>{s?.name.slice(0,1)||"?"}</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,color:C.txt,fontSize:11,cursor:"pointer"}} onClick={()=>setDStu(s)}>{s?.name} <span style={{fontWeight:400,color:C.txtHint,fontSize:10}}>{s?.grade}-{s?.cls}</span></div><div style={{color:C.txtHint,fontSize:10}}>{r.date.slice(5).replace("-",".")} · {r.timeStart}</div></div>
          <div style={{background:tc.bg,color:tc.color,borderRadius:5,padding:"2px 6px",fontSize:10,fontWeight:500,whiteSpace:"nowrap"}}>{r.type}</div>
        </div>);})}
      </div>
    </div>
  );
}

// ── 달력 뷰 ──────────────────────────────────
function CalView({yr,mo,calDays,sel,setSel,todayKey,moRec,allStu,grade,setGrade,selC,selResv,resv,delCounsel,delResv,setDStu,prevMo,nextMo,today,setYr,setMo,card,setCompMod,setShowSearch}){
  const [exp,setExp]=useState(null);
  const nb={background:"none",border:`1px solid ${C.bdr}`,borderRadius:6,width:26,height:26,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:C.txtSub};
  return(<div style={{paddingRight:18}}>

    {/* 달력 */}
    <div style={card}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
        <button style={nb} onClick={prevMo}><i className="ti ti-chevron-left" style={{fontSize:13}}/></button>
        <span style={{flex:1,textAlign:"center",fontSize:14,fontWeight:700,color:C.txt}}>{yr}년 {mo+1}월</span>
        <button style={nb} onClick={nextMo}><i className="ti ti-chevron-right" style={{fontSize:13}}/></button>
        <button style={{...nb,width:"auto",padding:"4px 10px",fontSize:11,fontFamily:"inherit",color:C.mintDk,borderColor:C.mintMid}}
          onClick={()=>{setYr(today.getFullYear());setMo(today.getMonth());setSel(dkey(today.getFullYear(),today.getMonth(),today.getDate()));}}>오늘</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
        {DOW.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,padding:"4px 0",color:i===0?"#E05252":i===6?C.mint:C.txtHint}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {calDays.map((cell,i)=>{
          const dk=cell.cur?dkey(yr,mo,cell.day):null;
          const dr=dk?moRec[dk]:null;
          const isSel=dk===sel,isToday=dk===todayKey,dow=i%7;
          const done=dr?Object.entries(dr):[];
          const reserved=dk?(resv[dk]||[]):[];
          const total=done.length+reserved.length;

          // 표시할 칩 목록 (예약 먼저, 완료 다음, 최대 3개)
          const chips=[];
          reserved.forEach(r=>{
            const s=allStu.find(x=>x.id===r.sid);
            chips.push({key:r.id, name:s?.name||"?", kind:"reserved", r});
          });
          done.forEach(([sid,logs])=>{
            const s=allStu.find(x=>x.id===sid);
            chips.push({key:sid, name:s?.name||sid, kind:"done", count:logs.length, type:logs[0]?.type});
          });
          const visible=chips.slice(0,3);
          const more=chips.length-visible.length;

          return(
            <div key={i} onClick={()=>dk&&setSel(dk)} style={{
              borderRadius:7,padding:"5px 4px",minHeight:82,
              cursor:cell.cur?"pointer":"default",
              background:isSel?C.mintLt:isToday?C.mintPal:"transparent",
              border:`1.5px solid ${isSel?C.mint:isToday?C.mintMid:C.bdr}`,
              opacity:cell.cur?1:0.28,overflow:"hidden",
              boxShadow:total>0&&!isSel?"0 1px 4px rgba(27,58,92,.06)":"none",
            }}>
              {/* 날짜 숫자 */}
              <div style={{
                textAlign:"center",fontSize:11,fontWeight:isSel||isToday?700:400,
                marginBottom:3,lineHeight:1,
                color:isSel?C.mintDk:isToday?C.mint:dow===0?"#E05252":dow===6?C.mint:C.txt
              }}>{cell.day}</div>

              {/* 칩들 */}
              {visible.map(chip=>(
                chip.kind==="reserved" ? (
                  /* 예약 칩 — 주황 + 클릭하면 완료 전환 */
                  <div key={chip.key}
                    onClick={e=>{e.stopPropagation();setCompMod({resv:chip.r,date:dk});}}
                    title={`${chip.name} — 클릭하면 상담 완료 처리`}
                    style={{
                      fontSize:9,fontWeight:700,borderRadius:4,
                      padding:"2px 4px",marginBottom:2,
                      background:"#FEF3E2",color:"#B8750E",
                      border:"1.5px solid #F0D89A",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                      display:"flex",alignItems:"center",gap:2,
                      cursor:"pointer",
                    }}>
                    <i className="ti ti-clock" style={{fontSize:8,flexShrink:0,color:"#C9963A"}}/>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>예약 · {chip.name}</span>
                  </div>
                ) : (
                  /* 완료 칩 — 민트 + 클릭하면 상세 보기 */
                  <div key={chip.key}
                    onClick={e=>{e.stopPropagation();const s=allStu.find(x=>x.id===chip.key);if(s)setDStu(s);}}
                    title={`${chip.name} — 클릭하면 상담 기록 보기`}
                    style={{
                      fontSize:9,fontWeight:600,borderRadius:4,
                      padding:"2px 4px",marginBottom:2,
                      background:isSel?`${C.mint}28`:C.mintLt,
                      color:C.mintDk,
                      border:`1.5px solid ${isSel?`${C.mint}50`:C.mintMid+"80"}`,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                      display:"flex",alignItems:"center",gap:2,
                      cursor:"pointer",
                    }}>
                    <i className="ti ti-check" style={{fontSize:8,flexShrink:0,color:C.mint}}/>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>완료 · {chip.name}{chip.count>1?` ×${chip.count}`:""}</span>
                  </div>
                )
              ))}

              {/* 더보기 */}
              {more>0&&(
                <div style={{
                  fontSize:9,borderRadius:4,padding:"1px 4px",
                  background:C.navyPal,color:C.navyMid,
                  textAlign:"center",fontWeight:600,
                }}>+{more}명</div>
              )}
            </div>
          );
        })}
      </div>
    </div>

    {/* 선택 날짜 패널 */}
    <div style={card}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.txt}}>{fmtDate(sel)}</div>
          <div style={{fontSize:11,color:C.txtHint,marginTop:2}}>
            완료 {selC.filter(c=>!grade||c.stu?.grade===grade).length}건
            {selResv.length>0&&<span style={{color:C.gold,marginLeft:6}}>· 예약 {selResv.length}건</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <button onClick={()=>setShowSearch(true)} style={{padding:"5px 12px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:C.mintLt,color:C.mintDk,border:`1.5px solid ${C.mint}`,fontWeight:600,display:"flex",alignItems:"center",gap:3}}>
            <i className="ti ti-search" style={{fontSize:11}}/> 학생 찾기
          </button>
          {[1,2,3].map(g=><button key={g} onClick={()=>setGrade(grade===g?0:g)} style={{padding:"5px 10px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:grade===g?C.navy:C.white,color:grade===g?C.white:C.txtSub,border:`1.5px solid ${grade===g?C.navy:C.bdr}`,fontWeight:grade===g?600:400}}>{g}학년</button>)}
        </div>
      </div>

      {/* ① 예약 섹션 */}
      {selResv.filter(r=>!grade||allStu.find(x=>x.id===r.sid)?.grade===grade).length>0&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.gold,marginBottom:8,display:"flex",alignItems:"center",gap:5}}>
            <i className="ti ti-clock" style={{fontSize:12}}/> 예약된 상담
          </div>
          {selResv.filter(r=>!grade||allStu.find(x=>x.id===r.sid)?.grade===grade).map(r=>{
            const s=allStu.find(x=>x.id===r.sid);
            return(
              <div key={r.id} style={{background:C.goldLt,border:`1.5px solid ${C.goldBdr}`,borderRadius:10,padding:"11px 13px",marginBottom:7,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${C.gold},#b8822e)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:C.white,flexShrink:0}}>
                  {s?.name.slice(0,1)||"?"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                    <span style={{fontWeight:700,color:C.txt,fontSize:13}}>{s?.name}</span>
                    <span style={{fontSize:10,color:C.txtHint}}>{s?.grade}학년 {s?.cls}반 {pad(s?.num)}번</span>
                    <span style={{background:"#FBF0D8",color:C.gold,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:600}}>{r.type}</span>
                  </div>
                  <div style={{fontSize:11,color:C.txtSub}}>{r.timeStart}~{r.timeEnd}{r.note?` · ${r.note}`:""}</div>
                </div>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  <button onClick={()=>setCompMod({resv:r,date:sel})} style={{background:`linear-gradient(135deg,${C.mint},${C.mintDk})`,color:C.white,border:"none",borderRadius:7,padding:"6px 11px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                    ✓ 상담 종료
                  </button>
                  <button onClick={()=>delResv(sel,r.id)} style={{background:"none",border:`1px solid ${C.bdr}`,borderRadius:7,width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:C.txtHint,fontSize:13}}>
                    <i className="ti ti-x"/>
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ② 완료된 상담 테이블 */}
      {selC.filter(c=>!grade||c.stu?.grade===grade).length===0&&selResv.filter(r=>!grade||allStu.find(x=>x.id===r.sid)?.grade===grade).length===0?(
        <div style={{textAlign:"center",padding:"28px",color:C.txtHint,fontSize:12}}>
          <i className="ti ti-calendar-off" style={{fontSize:26,display:"block",marginBottom:6,opacity:.4}}/>
          이 날 상담 기록이 없습니다<br/>
          <span style={{fontSize:11,marginTop:4,display:"inline-block"}}>위 <span style={{color:C.mintDk,fontWeight:600}}>상담 기록</span> 버튼을 눌러 기록하세요</span>
        </div>
      ):(
        selC.filter(c=>!grade||c.stu?.grade===grade).length>0&&(
          <>
            <div style={{fontSize:11,fontWeight:700,color:C.txtSub,marginBottom:6,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-check" style={{fontSize:12,color:C.mint}}/> 완료된 상담
            </div>
            <div style={{display:"grid",gridTemplateColumns:"54px 30px 40px 68px 88px 108px 1fr 26px",background:C.bg,borderRadius:"7px 7px 0 0",padding:"7px 10px",fontSize:11,fontWeight:600,color:C.txtHint}}>
              <span>학년</span><span>반</span><span>번호</span><span>이름</span><span>구분</span><span>시간</span><span>내용</span><span/>
            </div>
            {selC.filter(c=>!grade||c.stu?.grade===grade).map(c=>(
              <div key={c.id}>
                <div onClick={()=>setExp(exp===c.id?null:c.id)} style={{display:"grid",gridTemplateColumns:"54px 30px 40px 68px 88px 108px 1fr 26px",padding:"9px 10px",borderBottom:`1px solid ${C.bdr}`,fontSize:11,alignItems:"center",cursor:"pointer",background:exp===c.id?C.bg:C.white,color:C.txtSub}}>
                  <span>{c.stu?.grade}학년</span><span>{c.stu?.cls}</span><span>{pad(c.stu?.num)}</span>
                  <span style={{fontWeight:700,color:C.navy,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setDStu(c.stu);}}>{c.stu?.name}</span>
                  <span><span style={{background:TC[c.type]?.bg,color:TC[c.type]?.color,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:600}}>{c.type}</span></span>
                  <span style={{fontSize:10}}>{c.timeStart}~{c.timeEnd}</span>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:10,color:C.txtHint}}>{c.note}</span>
                  <button onClick={e=>{e.stopPropagation();delCounsel(sel,c.sid,c.id);}} style={{background:"none",border:"none",cursor:"pointer",color:C.bdrStr,fontSize:13,padding:0}}><i className="ti ti-x"/></button>
                </div>
                {exp===c.id&&(
                  <div style={{background:C.bg,padding:"12px 16px",borderBottom:`1px solid ${C.bdr}`,display:"grid",gridTemplateColumns:"200px 1fr",gap:14,fontSize:12}}>
                    <div>
                      <div style={{fontWeight:700,color:C.txt,fontSize:13,marginBottom:5}}>{c.stu?.grade}학년 {c.stu?.cls}반 {c.stu?.num}번 {c.stu?.name}</div>
                      <div style={{color:C.txtHint,fontSize:10,marginBottom:2}}>상담 일시</div>
                      <div style={{color:C.txtSub,marginBottom:8,fontSize:11}}>{fmtDate(sel)} {c.timeStart}~{c.timeEnd}</div>
                      <span style={{background:TC[c.type]?.bg,color:TC[c.type]?.color,borderRadius:5,padding:"2px 9px",fontSize:10,fontWeight:600}}>{c.type}</span>
                    </div>
                    <div>
                      <div style={{color:C.txtHint,fontSize:10,marginBottom:5}}>상담 내용</div>
                      <div style={{color:C.txtSub,lineHeight:1.7,whiteSpace:"pre-wrap",fontSize:12}}>{c.note||<span style={{color:C.txtHint}}>기록 없음</span>}</div>
                      <button onClick={()=>setDStu(c.stu)} style={{marginTop:8,background:"none",border:`1.5px solid ${C.mint}`,color:C.mintDk,borderRadius:7,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>상세 기록 보기 ›</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </>
        )
      )}
    </div>
  </div>);
}

// ── 상담 기록 뷰 ──────────────────────────────
function RecView({rec,allStu,delCounsel,setDStu,card}){
  const [search,setSearch]=useState("");const [tf,setTf]=useState("전체");
  const all=useMemo(()=>Object.entries(rec).flatMap(([d,v])=>Object.entries(v).flatMap(([sid,logs])=>logs.map(l=>({...l,date:d,sid,stu:allStu.find(s=>s.id===sid)})))).sort((a,b)=>b.date.localeCompare(a.date)),[rec,allStu]);
  const filtered=all.filter(c=>(tf==="전체"||c.type===tf)&&(!search||c.stu?.name.includes(search)||c.note?.includes(search)));
  const inp={width:"100%",padding:"9px 11px",border:`1.5px solid ${C.bdr}`,borderRadius:8,fontSize:13,fontFamily:"inherit",background:C.bg,color:C.txt,outline:"none",boxSizing:"border-box"};
  return(<div style={{paddingRight:18}}><div style={card}>
    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="학생 이름 또는 내용 검색..." style={{...inp,flex:1,minWidth:140}}/>
      {["전체",...TYPES].map(t=><button key={t} onClick={()=>setTf(t)} style={{padding:"5px 10px",borderRadius:7,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,background:tf===t?C.navy:C.white,color:tf===t?C.white:C.txtSub,border:`1.5px solid ${tf===t?C.navy:C.bdr}`}}>{t}</button>)}
    </div>
    <div style={{fontSize:11,color:C.txtHint,marginBottom:10}}>{filtered.length}건의 기록</div>
    {filtered.length===0&&<div style={{textAlign:"center",padding:"32px",color:C.txtHint,fontSize:12}}><i className="ti ti-clipboard-off" style={{fontSize:26,display:"block",marginBottom:6,opacity:.4}}/>상담 기록이 없습니다</div>}
    {filtered.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.bdr}`}}>
      <div style={{width:34,height:34,borderRadius:8,background:`linear-gradient(135deg,${C.mintLt},${C.mint}30)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:C.mintDk,flexShrink:0,cursor:"pointer"}} onClick={()=>setDStu(c.stu)}>{c.stu?.name.slice(0,1)||"?"}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
          <span style={{fontWeight:700,color:C.navy,cursor:"pointer",fontSize:12}} onClick={()=>setDStu(c.stu)}>{c.stu?.name}</span>
          <span style={{fontSize:10,color:C.txtHint}}>{c.stu?.grade}학년 {c.stu?.cls}반 {pad(c.stu?.num)}번</span>
          <span style={{background:TC[c.type]?.bg,color:TC[c.type]?.color,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:600}}>{c.type}</span>
        </div>
        <div style={{fontSize:11,color:C.txtHint,marginBottom:2}}>{fmtDate(c.date)} · {c.timeStart}~{c.timeEnd}</div>
        <div style={{fontSize:12,color:C.txtSub,lineHeight:1.6}}>{c.note||<span style={{color:C.txtHint}}>기록 없음</span>}</div>
      </div>
      <button onClick={()=>delCounsel(c.date,c.sid,c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.bdrStr,fontSize:14,padding:4}}><i className="ti ti-trash"/></button>
    </div>))}
  </div></div>);
}

// ── 학생 관리 뷰 ──────────────────────────────
function StuView({stu,allStu,allForStu,setDStu,setUpMod,card}){
  const [g,setG]=useState(0);const list=g===0?allStu:stu[g];
  return(<div style={{paddingRight:18}}><div style={card}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{display:"flex",gap:5}}>{[{v:0,l:"전체"},{v:1,l:"1학년"},{v:2,l:"2학년"},{v:3,l:"3학년"}].map(x=><button key={x.v} onClick={()=>setG(x.v)} style={{padding:"5px 12px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:g===x.v?C.navy:C.white,color:g===x.v?C.white:C.txtSub,border:`1.5px solid ${g===x.v?C.navy:C.bdr}`}}>{x.l}</button>)}</div>
      <button onClick={()=>setUpMod(true)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:7,fontSize:11,cursor:"pointer",background:C.mintLt,border:`1.5px solid ${C.mint}`,color:C.mintDk,fontFamily:"inherit",fontWeight:600}}><i className="ti ti-table-import" style={{fontSize:12}}/>명렬표 업로드</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:8}}>
      {list.map(s=>{const al=allForStu(s.id);const last=al[al.length-1];return(
        <div key={s.id} onClick={()=>setDStu(s)} style={{border:`1.5px solid ${C.bdr}`,borderRadius:9,padding:"11px 13px",cursor:"pointer",background:C.white,transition:"border-color .12s"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=C.mint} onMouseLeave={e=>e.currentTarget.style.borderColor=C.bdr}>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:7}}>
            <div style={{width:32,height:32,borderRadius:7,background:al.length>0?`linear-gradient(135deg,${C.mintLt},${C.mint}40)`:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:al.length>0?C.mintDk:C.txtHint}}>{s.name.slice(0,1)}</div>
            <div><div style={{fontWeight:700,color:C.txt,fontSize:12}}>{s.name}</div><div style={{fontSize:10,color:C.txtHint}}>{s.grade}학년 {s.cls}반 {pad(s.num)}번</div></div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,background:al.length>0?C.mintLt:C.bg,color:al.length>0?C.mintDk:C.txtHint,borderRadius:5,padding:"2px 7px",fontWeight:al.length>0?600:400}}>{al.length}회 상담</span>
            {last&&<span style={{fontSize:10,color:C.txtHint}}>최근:{last.date.slice(5).replace("-",".")}</span>}
          </div>
        </div>
      );})}
    </div>
  </div></div>);
}

// ── 통계 뷰 ──────────────────────────────────
function StatView({rec,yr,mo,card}){
  const months=Array.from({length:12},(_,i)=>{const pfx=`${yr}-${pad(i+1)}`;let c=0;Object.entries(rec).forEach(([d,v])=>{if(d.startsWith(pfx))Object.values(v).forEach(l=>c+=l.length);});return c;});
  return(<div style={{paddingRight:18}}><div style={card}>
    <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:18}}>월별 상담 현황 ({yr}년)</div>
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:140}}>
      {months.map((cnt,i)=>{const h=months.some(v=>v>0)?Math.max(8,(cnt/Math.max(...months))*110):8;const ia=i===mo;return(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:10,color:ia?C.mintDk:C.txtHint,fontWeight:600,opacity:cnt>0?1:0,minHeight:14}}>{cnt}</div>
          <div style={{width:"100%",height:h,borderRadius:"4px 4px 0 0",background:ia?`linear-gradient(180deg,${C.mint},${C.mintDk})`:C.navyLt,border:`1px solid ${ia?C.mintMid:C.bdr}`}}/>
          <div style={{fontSize:10,color:ia?C.mintDk:C.txtHint,fontWeight:ia?700:400}}>{MONTHS[i]}</div>
        </div>
      );})}
    </div>
  </div></div>);
}

// ── 학생 상세 드로어 ──────────────────────────

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>

          <div style={{fontSize:15,fontWeight:700,color:C.txt}}>{stu.name}</div>

      <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.txtHint}}>×</button>

          <span style={{fontSize:11,color:C.txtHint}}>{fmtDate(c.date)} · {c.timeStart}~{c.timeEnd}</span>
          <span style={{background:TC[c.type]?.bg,color:TC[c.type]?.color,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:600}}>{c.type}</span>

function buildReportXlsx(rec, allStu, year, month) {
  // 해당 월 상담 데이터 추출 & 정렬
  const prefix = `${year}-${pad(month)}`;
  const rows = [];
  Object.entries(rec)
    .filter(([d]) => d.startsWith(prefix))
    .sort(([a],[b]) => a.localeCompare(b))
    .forEach(([date, dayRec]) => {
      const [,mm,dd] = date.split("-");
      const dateStr = `${+mm}/${+dd}`;
      Object.entries(dayRec).forEach(([sid, logs]) => {
        const stu = allStu.find(s => s.id === sid);
        logs.forEach(log => {
          rows.push({
            hakbun: stu ? `${stu.grade}-${stu.cls}` : sid,
            name:   stu ? stu.name : sid,
            date:   dateStr,
            time:   `${log.timeStart}~${log.timeEnd}`,
            type:   log.type,
            note:   log.note || "",
          });
        });
      });
    });

  const wb = XLSX.utils.book_new();
  const monthName = `${+month}월`;

  // 워크시트 데이터 배열 구성
  const wsData = [];

  // 1행: 타이틀
  wsData.push([`진로상담총괄표          ${year}년 ( ${+month} )월          ( ${+month} )월 총 상담건수: ${rows.length}건`,"","","","","","","",""]);
  // 2행: 헤더
  wsData.push(["연번","내담자","","상담일자","상담시간","상담 구분","","","상 담 내 용"]);
  // 3행: 서브헤더
  wsData.push(["","학번","성명","","","진학","진로","기타","진학·진로·기타 상담내용 간략히 기록"]);

  // 데이터행
  rows.forEach((r, i) => {
    const isJinhak = r.type === "학업/진로" ? "" : (r.type === "진로 고민" ? "O" : "");
    const isJinro  = r.type === "진로 고민" ? "O" : (r.type === "학업/진로" ? "O" : "");
    const isEtc    = (r.type === "교우/정서" || r.type === "기타") ? "O" : "";
    // 상담구분 매핑: 진학=col5(F), 진로=col6(G), 기타=col7(H)
    const typeMap = {
      "학업/진로":  ["O","",""],
      "진로 고민":  ["","O",""],
      "교우/정서":  ["","","O"],
      "기타":       ["","","O"],
    };
    const [t1,t2,t3] = typeMap[r.type] || ["","",""];
    wsData.push([i+1, r.hakbun, r.name, r.date, r.time, t1, t2, t3, r.note]);
  });

  // 빈 행 (최소 20행 보장)
  const minRows = Math.max(0, 20 - rows.length);
  for(let i=0;i<minRows;i++) wsData.push([rows.length+i+1,"","","","","","","",""]);

  // 계 행
  const dataStart = 4;
  const dataEnd   = dataStart + Math.max(rows.length, 20) - 1;
  wsData.push(["계","","","","",
    `=COUNTIF(F${dataStart}:F${dataEnd},"O")`,
    `=COUNTIF(G${dataStart}:G${dataEnd},"O")`,
    `=COUNTIF(H${dataStart}:H${dataEnd},"O")`,
    ""
  ]);

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // 열 너비 설정
  ws["!cols"] = [
    {wch:6},{wch:10},{wch:10},{wch:10},{wch:16},
    {wch:7},{wch:7},{wch:7},{wch:55}
  ];

  // 행 높이 설정 (SheetJS 지원 범위)
  ws["!rows"] = [
    {hpt:30},{hpt:18},{hpt:16},
    ...wsData.slice(3).map(() => ({hpt:16}))
  ];

  // 셀 병합
  const totalDataRows = wsData.length;
  ws["!merges"] = [
    {s:{r:0,c:0},e:{r:0,c:8}},   // 타이틀
    {s:{r:1,c:1},e:{r:1,c:2}},   // 내담자 헤더
    {s:{r:1,c:5},e:{r:1,c:7}},   // 상담구분 헤더
    {s:{r:2,c:0},e:{r:3,c:0}},   // 연번 (2~3행)
    {s:{r:totalDataRows-1,c:0},e:{r:totalDataRows-1,c:4}},  // 계
  ];

  XLSX.utils.book_append_sheet(wb, ws, monthName);
  return wb;
}

        const [,mm,dd] = date.split("-");

              time:   `${log.timeStart}~${log.timeEnd}`,

            <div style={{display:"flex",gap:8}}>
              {TYPES.map((t,i)=>{
                const cnt=monthData.filter(r=>r.type===t).length;
                return cnt>0?(
                  <div key={t} style={{display:"flex",alignItems:"center",gap:4,background:TC[t].bg,color:TC[t].color,borderRadius:7,padding:"3px 9px",fontSize:11,fontWeight:600}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:typeColors[i]}}/>
                    {t} {cnt}건
                  </div>
                ):null;
              })}
            </div>
          )}
        </div>

        {monthData.length===0?(
          <div style={{textAlign:"center",padding:"40px",color:C.txtHint,fontSize:12}}>
            <i className="ti ti-file-off" style={{fontSize:30,display:"block",marginBottom:8,opacity:.4}}/>
            {selMonth}월 상담 기록이 없습니다
          </div>
        ):(
          <>
            {/* 테이블 헤더 */}
            <div style={{display:"grid",gridTemplateColumns:"40px 70px 70px 70px 120px 90px 1fr",background:C.navy,borderRadius:"7px 7px 0 0",padding:"7px 10px",fontSize:11,fontWeight:600,color:C.white}}>
              <span>연번</span><span>학번</span><span>성명</span><span>상담일</span><span>상담시간</span><span>구분</span><span>상담 내용</span>
            </div>
            {monthData.map((r,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"40px 70px 70px 70px 120px 90px 1fr",padding:"8px 10px",borderBottom:`1px solid ${C.bdr}`,fontSize:11,alignItems:"center",background:i%2===0?C.white:C.bg,color:C.txtSub}}>
                <span style={{color:C.txtHint}}>{i+1}</span>
                <span style={{fontWeight:500,color:C.txt}}>{r.hakbun}</span>
                <span style={{fontWeight:600,color:C.navy}}>{r.name}</span>
                <span>{r.date}</span>
                <span style={{fontSize:10}}>{r.time}</span>
                <span><span style={{background:TC[r.type]?.bg,color:TC[r.type]?.color,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{r.type}</span></span>
                <span style={{color:C.txtSub,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.note}</span>
              </div>
            ))}
            {/* 합계 행 */}
            <div style={{display:"grid",gridTemplateColumns:"40px 70px 70px 70px 120px 90px 1fr",padding:"8px 10px",background:C.navy,borderRadius:"0 0 7px 7px",fontSize:11,fontWeight:700,color:C.white,alignItems:"center"}}>
              <span style={{gridColumn:"1/6"}}>계 · 총 {monthData.length}건</span>
              <span>
                {TYPES.map((t,i)=>{
                  const cnt=monthData.filter(r=>r.type===t).length;
                  return cnt>0?<span key={t} style={{marginRight:6,fontSize:10}}>{t.split(' ')[0]}:{cnt}</span>:null;
                })}
              </span>
              <span/>
            </div>
          </>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
